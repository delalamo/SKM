name: Check notes

on:
  push:
    branches: [main]
    paths:
      - "content/notes/**.md"
      - "content/MOCs/**.md"
      - "scripts/generate_mocs.py"
      - "scripts/format_notes.py"
  pull_request:
    paths:
      - "content/notes/**.md"
      - "content/MOCs/**.md"
      - "scripts/generate_mocs.py"
      - "scripts/format_notes.py"
  workflow_dispatch:

jobs:
  check-mocs:
    name: MOCs are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Regenerate MOCs
        run: python3 scripts/generate_mocs.py

      - name: Fail if MOCs differ from committed versions
        run: |
          if ! git diff --exit-code content/MOCs/; then
            echo ""
            echo "❌ MOC files are out of date."
            echo "   Run 'python3 scripts/generate_mocs.py' locally and commit the result."
            exit 1
          fi
          echo "✅ MOCs are up to date."

  check-citations:
    name: No bare fallback citations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for bare fallback citations
        run: |
          # Bare fallbacks match: [^key]: Some Text. https://doi.org/...
          # Full citations always contain a quoted title (") or italicised journal (*)
          PATTERN='^\[\^[a-z0-9]+\]: [^"*]+https://doi\.org/'
          MATCHES=$(grep -rn --include="*.md" -E "$PATTERN" content/notes/ || true)

          if [ -n "$MATCHES" ]; then
            echo "❌ Found bare fallback citations that were never fully fetched:"
            echo ""
            echo "$MATCHES"
            echo ""
            echo "   Run 'python3 scripts/format_notes.py --refresh-citations' locally and commit the result."
            exit 1
          fi
          echo "✅ All citations are fully formatted."
