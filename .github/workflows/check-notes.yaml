name: Check notes

on:
  push:
    branches: [main]
    paths:
      - "content/notes/**.md"
      - "content/tags/**.md"
      - "scripts/format_notes.py"
  pull_request:
    paths:
      - "content/notes/**.md"
      - "content/tags/**.md"
      - "scripts/format_notes.py"
  workflow_dispatch:

jobs:
  check-citations:
    name: No bare fallback citations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for bare fallback citations
        run: |
          # Bare fallbacks match: [^key]: Some Text. https://doi.org/...
          # Full citations always contain a quoted title (") or italicised journal (*)
          PATTERN='^\[\^[a-z0-9]+\]: [^"*]+https://doi\.org/'
          MATCHES=$(grep -rn --include="*.md" -E "$PATTERN" content/notes/ content/tags/ || true)

          if [ -n "$MATCHES" ]; then
            echo "❌ Found bare fallback citations in authored content that were never fully fetched:"
            echo ""
            echo "$MATCHES"
            echo ""
            echo "   Run 'python3 scripts/format_notes.py --refresh-citations' locally and commit the result."
            exit 1
          fi
          echo "✅ All citations are fully formatted."
