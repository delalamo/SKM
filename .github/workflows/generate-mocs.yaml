name: Generate MOCs

on:
  push:
    branches:
      - main
    paths:
      - "content/notes/**.md"   # only run when notes actually change
      - "generate_mocs.py"      # or when the script itself changes
  workflow_dispatch:             # also allows manual trigger from GitHub UI

jobs:
  generate-mocs:
    if: false  # disabled — MOC generation now handled by the pre-commit hook
    runs-on: ubuntu-latest
    permissions:
      contents: write            # needed to push the generated files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run MOC generator
        run: python3 scripts/generate_mocs.py

      - name: Commit generated MOCs (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/MOCs/
          if git diff --staged --quiet; then
            echo "No MOC changes to commit."
          else
            git commit -m "chore: regenerate MOCs [skip ci]"
            git push
          fi
