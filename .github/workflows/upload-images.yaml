name: Upload images to R2

on:
  push:
    branches: [main]
    paths:
      - "content/notes/**"
  workflow_dispatch:

jobs:
  upload:
    if: false  # disabled — R2 approach replaced by local static/assets/ copy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Upload new images to R2 and rewrite embeds
        env:
          R2_ACCOUNT_ID:      ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:   ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:          ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          # Images live outside the quartz/ subdirectory in the full vault,
          # but in CI we only have the quartz/ repo. Copy images from a
          # dedicated images branch or submodule if needed.
          # For now, point at the quartz/content/images/ directory if images
          # are committed there, or adjust --images-dir as appropriate.
          python3 scripts/copy_images_to_assets.py

      - name: Commit rewritten note embeds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/notes/
          if git diff --cached --quiet; then
            echo "No embed rewrites to commit."
          else
            git commit -m "chore: rewrite image embeds to R2 URLs [skip ci]"
            git push
          fi
